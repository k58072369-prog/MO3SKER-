<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MO3SKER — جاري التحميل</title>
    <script>
        // GitHub Pages SPA Redirect
        // يحفظ المسار الحالي ثم يعيد التوجيه إلى index.html
        (function() {
            var path = window.location.pathname;
            var search = window.location.search;
            var hash = window.location.hash;
            // Store the intended URL in sessionStorage
            var redirect = path + search + hash;
            sessionStorage.setItem('spa_redirect', redirect);
            // Redirect to root index
            window.location.replace('/');
        })();
    </script>
    <style>
        body {
            background: #080e1a;
            color: #38bdf8;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: Cairo, sans-serif;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <p>⏳ جاري التحميل...</p>
</body>
</html>
